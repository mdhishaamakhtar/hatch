# Default values for the Hatch chart. Phase 0 deployed data infra; Phase 1
# adds the scheduler-api service. Each Hatch service has its own `enabled`
# toggle so individual phases can opt in/out independently.

api:
  enabled: true
  image: hatch/api:dev
  imagePullPolicy: Always
  replicas: 1
  # Hatch services start at port 9021 and walk forward — keeps the 8080/3000
  # tooling range free and avoids any host-side port remap.
  servicePort: 9021

postgres:
  image: postgres:17-alpine
  database: hatch
  user: hatch
  storage: 5Gi
  servicePort: 5432

redis:
  image: redis:7-alpine
  storage: 1Gi
  servicePort: 6379

kafka:
  image: apache/kafka:3.9.0
  storage: 5Gi
  brokerPort: 9092
  controllerPort: 9093
  clusterID: 5L6g3nShT-eMCtK--X86sw
