{{- if .Values.reconciliationCron.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reconciliation-cron
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: reconciliation-cron
spec:
  replicas: {{ .Values.reconciliationCron.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: reconciliation-cron
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: hatch
        app.kubernetes.io/component: reconciliation-cron
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.reconciliationCron.adminPort | quote }}
    spec:
      # The cron pings Postgres and dials Kafka eagerly at boot, so gate startup
      # on both accepting connections.
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.initWait.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for dep in "postgres {{ .Values.postgres.servicePort }}" "kafka {{ .Values.kafka.brokerPort }}"; do
                set -- $dep
                until nc -w 2 "$1" "$2" </dev/null 2>/dev/null; do
                  echo "waiting for $1:$2…"
                  sleep 2
                done
                echo "$1:$2 reachable"
              done
      containers:
        - name: reconciliation-cron
          image: {{ .Values.reconciliationCron.image | quote }}
          imagePullPolicy: {{ .Values.reconciliationCron.imagePullPolicy | default "Always" | quote }}
          ports:
            - containerPort: {{ .Values.reconciliationCron.adminPort }}
              name: admin
          envFrom:
            - secretRef:
                name: hatch-secrets
          env:
            - name: RECON_ADMIN_PORT
              value: {{ .Values.reconciliationCron.adminPort | quote }}
            - name: RECON_INTERVAL
              value: {{ .Values.reconciliationCron.interval | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
{{- end }}
