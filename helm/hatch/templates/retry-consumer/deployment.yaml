{{- if .Values.retryConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retry-consumer
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: retry-consumer
spec:
  replicas: {{ .Values.retryConsumer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: retry-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: hatch
        app.kubernetes.io/component: retry-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.retryConsumer.adminPort | quote }}
    spec:
      # The consumer dials Kafka eagerly at boot, so gate startup on the broker
      # accepting connections (it needs nothing else — no Postgres/Redis).
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.initWait.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              until nc -w 2 kafka {{ .Values.kafka.brokerPort }} </dev/null 2>/dev/null; do
                echo "waiting for kafka:{{ .Values.kafka.brokerPort }}…"
                sleep 2
              done
              echo "kafka:{{ .Values.kafka.brokerPort }} reachable"
      containers:
        - name: retry-consumer
          image: {{ .Values.retryConsumer.image | quote }}
          imagePullPolicy: {{ .Values.retryConsumer.imagePullPolicy | default "Always" | quote }}
          ports:
            - containerPort: {{ .Values.retryConsumer.adminPort }}
              name: admin
          envFrom:
            - secretRef:
                name: hatch-secrets
          env:
            - name: RETRY_ADMIN_PORT
              value: {{ .Values.retryConsumer.adminPort | quote }}
            - name: RETRY_DRAIN_BATCH
              value: {{ .Values.retryConsumer.drainBatchSize | quote }}
            - name: RETRY_INTERVAL_1MIN
              value: {{ .Values.retryConsumer.intervals.tier1min | quote }}
            - name: RETRY_INTERVAL_5MIN
              value: {{ .Values.retryConsumer.intervals.tier5min | quote }}
            - name: RETRY_INTERVAL_30MIN
              value: {{ .Values.retryConsumer.intervals.tier30min | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
{{- end }}
