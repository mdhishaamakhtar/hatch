{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scheduler
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: scheduler
spec:
  serviceName: scheduler
  replicas: {{ .Values.scheduler.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: hatch
        app.kubernetes.io/component: scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.scheduler.adminPort | quote }}
    spec:
      # Block startup until dependencies accept connections. Postgres is the
      # boot-crash source (db.NewPool pings and Fatal-exits); kafka is the
      # produce target, waited on to avoid noisy produce errors at boot.
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.initWait.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for dep in "postgres {{ .Values.postgres.servicePort }}" "kafka {{ .Values.kafka.brokerPort }}"; do
                set -- $dep
                until nc -w 2 "$1" "$2" </dev/null 2>/dev/null; do
                  echo "waiting for $1:$2…"
                  sleep 2
                done
                echo "$1:$2 reachable"
              done
      containers:
        - name: scheduler
          image: {{ .Values.scheduler.image | quote }}
          imagePullPolicy: {{ .Values.scheduler.imagePullPolicy | default "Always" | quote }}
          ports:
            - containerPort: {{ .Values.scheduler.adminPort }}
              name: admin
          envFrom:
            - secretRef:
                name: hatch-secrets
          env:
            - name: TOTAL_PODS
              value: {{ .Values.scheduler.replicas | quote }}
            - name: SCHEDULER_ADMIN_PORT
              value: {{ .Values.scheduler.adminPort | quote }}
            - name: SCHEDULER_WHEEL_DB_PATH
              value: "/var/lib/hatch/wheel.db"
            - name: SCHEDULER_SCHEDULE_CHANNEL_BUFFER
              value: {{ .Values.scheduler.scheduleChannelBuffer | quote }}
            - name: SCHEDULER_CLEAR_CHANNEL_BUFFER
              value: {{ .Values.scheduler.clearChannelBuffer | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: wheel-data
              mountPath: /var/lib/hatch
  volumeClaimTemplates:
    - metadata:
        name: wheel-data
        labels:
          app.kubernetes.io/part-of: hatch
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.scheduler.wheelStorage.size | quote }}
{{- end }}
