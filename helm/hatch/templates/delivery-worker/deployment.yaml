{{- if .Values.deliveryWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-worker
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: delivery-worker
spec:
  replicas: {{ .Values.deliveryWorker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: delivery-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: hatch
        app.kubernetes.io/component: delivery-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.deliveryWorker.adminPort | quote }}
    spec:
      # Block startup until dependencies accept connections. The worker pings
      # Postgres and dials Redis/Kafka eagerly at boot and Fatal-exits on failure,
      # so without this it CrashLoopBackOffs racing its own dependencies.
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.initWait.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for dep in "postgres {{ .Values.postgres.servicePort }}" "redis {{ .Values.redis.servicePort }}" "kafka {{ .Values.kafka.brokerPort }}"; do
                set -- $dep
                until nc -w 2 "$1" "$2" </dev/null 2>/dev/null; do
                  echo "waiting for $1:$2…"
                  sleep 2
                done
                echo "$1:$2 reachable"
              done
      containers:
        - name: delivery-worker
          image: {{ .Values.deliveryWorker.image | quote }}
          imagePullPolicy: {{ .Values.deliveryWorker.imagePullPolicy | default "Always" | quote }}
          ports:
            - containerPort: {{ .Values.deliveryWorker.adminPort }}
              name: admin
          envFrom:
            - secretRef:
                name: hatch-secrets
          env:
            - name: DELIVERY_ADMIN_PORT
              value: {{ .Values.deliveryWorker.adminPort | quote }}
            - name: DELIVERY_BATCH_SIZE
              value: {{ .Values.deliveryWorker.batchSize | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
{{- end }}
