{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: hatch
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.api.servicePort | quote }}
    spec:
      # Block startup until dependencies accept connections. The app pings
      # Postgres and dials Redis eagerly at boot (db.NewPool / rueidis.NewClient)
      # and Fatal-exits on failure, so without this it CrashLoopBackOffs while
      # racing its own dependencies on every bring-up.
      initContainers:
        - name: wait-for-deps
          image: {{ .Values.initWait.image | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for dep in "postgres {{ .Values.postgres.servicePort }}" "redis {{ .Values.redis.servicePort }}"; do
                set -- $dep
                until nc -w 2 "$1" "$2" </dev/null 2>/dev/null; do
                  echo "waiting for $1:$2…"
                  sleep 2
                done
                echo "$1:$2 reachable"
              done
      containers:
        - name: api
          image: {{ .Values.api.image | quote }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy | default "IfNotPresent" | quote }}
          ports:
            - containerPort: {{ .Values.api.servicePort }}
              name: http
          envFrom:
            - secretRef:
                name: hatch-secrets
          env:
            - name: API_PORT
              value: {{ .Values.api.servicePort | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
{{- end }}
