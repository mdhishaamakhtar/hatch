# In-cluster log probe. Emits a structured JSON log line to stdout that
# Promtail tails and ships to Loki. The pod uses the busybox image with no
# external network calls; Promtail discovers it by namespace + pod selectors
# baked into the chart defaults.
apiVersion: v1
kind: Pod
metadata:
  name: log-probe
  namespace: hatch
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: log-probe
spec:
  restartPolicy: Never
  containers:
    - name: emitter
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          ts=$(date +%s%N)
          echo "{\"service\":\"probe\",\"level\":\"info\",\"ts\":$ts,\"msg\":\"phase0 log probe\",\"probe\":\"loki-roundtrip\"}"
          # Hold so Promtail definitely picks the line up before pod terminates
          # (Promtail batches with a short interval).
          sleep 30
