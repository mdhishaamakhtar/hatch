# In-cluster trace probe. telemetrygen is the official OpenTelemetry tool for
# emitting synthetic spans. We point it at Tempo's OTLP gRPC receiver via
# ClusterDNS — no external hops, no port-forwards.
apiVersion: batch/v1
kind: Job
metadata:
  name: trace-probe
  namespace: hatch
  labels:
    app.kubernetes.io/part-of: hatch
    app.kubernetes.io/component: trace-probe
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: trace-probe
    spec:
      restartPolicy: Never
      containers:
        - name: telemetrygen
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.124.0
          args:
            - traces
            - --otlp-endpoint=observability-tempo.observability.svc.cluster.local:4317
            - --otlp-insecure
            - --service=probe
            - --traces=1
            - --span-duration=10ms
            - --workers=1
            - --rate=0
