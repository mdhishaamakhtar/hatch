version: "2"
sql:
  - engine: postgresql
    queries: queries/
    schema: migrations/
    gen:
      go:
        package: gen
        out: gen
        sql_package: pgx/v5
        emit_pointers_for_null_types: true
        emit_json_tags: true
        emit_db_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
